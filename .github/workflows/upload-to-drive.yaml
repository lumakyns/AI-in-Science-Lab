name: Upload to Google Drive

on:
  push:
    branches:
      - main

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install rclone
        run: |
          curl https://rclone.org/install.sh | sudo bash

      - name: Configure rclone
        run: |
          mkdir -p ~/.config/rclone
          echo "${{ secrets.GDRIVE_CREDENTIALS }}" | base64 --decode > credentials.json
          echo "[gdrive]" > ~/.config/rclone/rclone.conf
          echo "type = drive" >> ~/.config/rclone/rclone.conf
          echo "scope = drive" >> ~/.config/rclone/rclone.conf
          echo "service_account_file = credentials.json" >> ~/.config/rclone/rclone.conf
          echo "root_folder_id = 1cKs7x6D4uQhi7o4GbVznbLtOoKOCHrUo" >> ~/.config/rclone/rclone.conf

      - name: Upload files to Google Drive
        run: |
          rclone sync ./ "gdrive:Unsupervised-Feature-Research" \
            --exclude "data/**" \
            --exclude ".mypy_cache/**" \
            --exclude ".git/**" \
            --progress